<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Project Imladris — The Living Campus</title>
<style>
  :root{
    --ink:#1a1f2e;--mist:#f2efe6;--mist-dim:#aeb4c4;
    --amber:#f0a93f;--moss:#7ad6a8;--glacial:#5fb3c9;
    --line:rgba(242,239,230,.16);--panel:rgba(22,26,40,.74);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#4a4f66;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    color:var(--mist);-webkit-font-smoothing:antialiased;touch-action:none}
  #app{position:fixed;inset:0}
  canvas{display:block}

  .top{position:fixed;top:0;left:0;right:0;padding:16px 18px;display:flex;
    justify-content:space-between;align-items:flex-start;gap:12px;pointer-events:none;z-index:10}
  .brand h1{font-family:"Iowan Old Style",Georgia,"Times New Roman",serif;font-weight:500;
    font-size:19px;letter-spacing:.02em;margin:0;line-height:1.1;text-shadow:0 2px 16px rgba(0,0,0,.5)}
  .brand h1 .accent{color:var(--amber)}
  .brand p{margin:3px 0 0;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mist-dim)}
  .tools{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;pointer-events:auto}
  .btn{pointer-events:auto;background:var(--panel);color:var(--mist);border:1px solid var(--line);
    border-radius:999px;padding:8px 13px;font-size:12px;letter-spacing:.02em;cursor:pointer;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    transition:border-color .2s,background .2s,color .2s;white-space:nowrap}
  .btn:hover{border-color:rgba(240,169,63,.6)}
  .btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .btn.on{color:var(--ink);background:var(--amber);border-color:var(--amber)}

  .legend{position:fixed;top:64px;right:18px;width:250px;max-height:calc(100% - 92px);overflow:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:8px;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:12;transform-origin:top right;
    transition:opacity .22s,transform .22s;box-shadow:0 18px 50px rgba(0,0,0,.45)}
  .legend.hidden{opacity:0;transform:scale(.96);pointer-events:none}
  .legend h2{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mist-dim);margin:8px 10px 6px}
  .legend button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;
    border:0;color:var(--mist);padding:9px 10px;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit}
  .legend button:hover{background:rgba(255,255,255,.06)}
  .legend button:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}
  .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 8px currentColor}

  .info{position:fixed;z-index:13;background:var(--panel);border:1px solid var(--line);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 20px 60px rgba(0,0,0,.5);
    transition:transform .34s cubic-bezier(.2,.8,.2,1),opacity .3s}
  .info .eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin:0 0 6px}
  .info h3{font-family:"Iowan Old Style",Georgia,serif;font-weight:500;font-size:21px;margin:0 0 10px;line-height:1.15}
  .info p{margin:0;font-size:14px;line-height:1.6;color:#e2e0d6}
  .info .close{position:absolute;top:12px;right:14px;background:none;border:0;color:var(--mist-dim);
    font-size:20px;cursor:pointer;line-height:1;padding:4px}
  .info .close:hover{color:var(--mist)}
  @media (min-width:721px){
    .info{top:50%;right:18px;transform:translateY(-50%) translateX(120%);width:322px;padding:26px 24px;border-radius:18px;opacity:0}
    .info.open{transform:translateY(-50%) translateX(0);opacity:1}
  }
  @media (max-width:720px){
    .legend{left:18px;right:18px;width:auto}
    .info{left:0;right:0;bottom:0;padding:22px 20px 26px;border-radius:20px 20px 0 0;border-bottom:0;transform:translateY(110%)}
    .info.open{transform:translateY(0)}
    .brand h1{font-size:16px}
  }
  .hint{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);z-index:9;font-size:11.5px;
    letter-spacing:.06em;color:var(--mist-dim);background:rgba(22,26,40,.5);padding:7px 14px;border-radius:999px;
    border:1px solid var(--line);backdrop-filter:blur(8px);transition:opacity .6s;pointer-events:none;text-align:center}
  @media (max-width:720px){.hint{bottom:54px}}
  .ticker{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:11;display:flex;align-items:center;
    gap:9px;font-size:12.5px;letter-spacing:.01em;color:var(--mist);background:var(--panel);padding:9px 16px;
    border-radius:999px;border:1px solid var(--line);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    max-width:92vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .ticker .pulse{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--moss);box-shadow:0 0 8px currentColor;
    animation:tpulse 1.6s ease-in-out infinite}
  .sectorbar{position:fixed;top:62px;left:18px;z-index:11;display:flex;gap:7px;flex-wrap:wrap;max-width:62vw}
  .schip{display:flex;align-items:center;gap:7px;background:var(--panel);color:var(--mist);border:1px solid var(--line);
    border-radius:999px;padding:6px 11px;font-size:11.5px;cursor:pointer;backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);font-family:inherit;transition:border-color .2s}
  .schip:hover{border-color:rgba(240,169,63,.6)}
  .schip:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .sdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 7px currentColor}
  #btnFire.on{background:#ff5a4a;border-color:#ff5a4a;color:#fff}
  @media (max-width:720px){.sectorbar{top:96px;left:12px;max-width:94vw}.schip{padding:5px 9px;font-size:11px}}
  @keyframes tpulse{0%,100%{opacity:.45;transform:scale(.8)}50%{opacity:1;transform:scale(1.25)}}
  @media (max-width:720px){.ticker{bottom:12px;font-size:11.5px;padding:8px 13px}}
  @media (prefers-reduced-motion:reduce){.ticker .pulse{animation:none}}
  #loader{position:fixed;inset:0;background:#4a4f66;display:flex;align-items:center;justify-content:center;
    z-index:30;transition:opacity .6s;flex-direction:column;gap:18px}
  #loader.gone{opacity:0;pointer-events:none}
  .ring{width:34px;height:34px;border-radius:50%;border:2px solid rgba(240,169,63,.25);border-top-color:var(--amber);animation:spin 1s linear infinite}
  #loader p{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mist-dim);margin:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.ring{animation:none}}
</style>
</head>
<body>
<div id="app"></div>
<div class="top">
  <div class="brand"><h1>Project <span class="accent">Imladris</span></h1><p>The Living Campus · diorama</p></div>
  <div class="tools">
    <button class="btn" id="btnSystems">Systems</button>
    <button class="btn on" id="btnRotate">Auto-orbit</button>
    <button class="btn" id="btnNight">Night</button>
    <button class="btn" id="btnFire">Wildfire</button>
    <button class="btn" id="btnReset">Reset</button>
  </div>
</div>
<nav class="legend hidden" id="legend" aria-label="Campus systems"></nav>
<div class="sectorbar" id="sectorbar" aria-label="Sectors"></div>
<aside class="info" id="info" role="dialog" aria-live="polite">
  <button class="close" id="infoClose" aria-label="Close">×</button>
  <p class="eyebrow" id="infoEyebrow"></p><h3 id="infoTitle"></h3><p id="infoBody"></p>
</aside>
<div class="hint" id="hint">Drag to orbit · pinch or scroll to zoom · tap a glowing node</div>
<div class="ticker" id="ticker"><span class="pulse"></span><span id="tickerText">Initializing campus systems…</span></div>
<div id="loader"><div class="ring"></div><p>Growing the valley…</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous" onerror="var l=document.getElementById('loader');if(l)l.querySelector('p').textContent='Could not load 3D library (check connection)';"></script>
<script>
"use strict";
window.addEventListener('error',function(ev){console.error('Caught error:',ev.message,ev.filename,ev.lineno,ev.error||'');});
window.addEventListener('unhandledrejection',function(ev){console.error('Unhandled promise rejection:',ev.reason);});
(function(){
  if(typeof THREE==='undefined'){var l=document.getElementById('loader');if(l)l.querySelector('p').textContent='3D library failed to load';return;}
  try{
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const lerp=(a,b,t)=>a+(b-a)*t;
  let _s=20240722; const rand=()=>{_s=(_s*1664525+1013904223)&0x7fffffff;return _s/0x7fffffff;};
  const smooth=(e0,e1,x)=>{const t=clamp((x-e0)/(e1-e0),0,1);return t*t*(3-2*t);};

  // ---------- terrain (gentle diorama top surface) ----------
  const HALF=88;
  function riverX(z){ return 24*Math.sin(z*0.02); }
  function gauss(x,z,cx,cz,s){const dx=x-cx,dz=z-cz;return Math.exp(-((dx*dx+dz*dz)/(2*s*s)));}
  const TRIBA={x:58,z:30},TRIBB={x:-2.4,z:-6};
  function segDist(px,pz,ax,az,bx,bz){const dx=bx-ax,dz=bz-az;const L=dx*dx+dz*dz||1;let t=((px-ax)*dx+(pz-az)*dz)/L;t=Math.max(0,Math.min(1,t));return Math.hypot(px-(ax+t*dx),pz-(az+t*dz));}
  function terrain(x,z){
    let roll=(Math.sin(x*0.06)*Math.cos(z*0.05)+Math.sin(x*0.09+1)*0.5)*1.7;
    let hill=gauss(x,z,22,54,25)*17 + gauss(x,z,-30,60,18)*8;
    const d=x-riverX(z);
    const river=-Math.exp(-(d*d)/(2*49))*3.2;
    const rb=segDist(x,z,TRIBA.x,TRIBA.z,TRIBB.x,TRIBB.z);
    const trib=-Math.exp(-(rb*rb)/(2*30))*2.4;
    let y=roll+hill+river+trib+2.2;
    // settle the rim so grass meets the soil block cleanly
    const m=Math.max(Math.abs(x),Math.abs(z))/HALF;
    y=lerp(y,1.0,smooth(0.84,1.0,m));
    return y;
  }

  const app=document.getElementById('app');
  const scene=new THREE.Scene();

  // ---------- orthographic diorama camera ----------
  let aspect=innerWidth/innerHeight;
  const FR=118;
  const camera=new THREE.OrthographicCamera(-FR*aspect,FR*aspect,FR,-FR,0.1,3000);
  camera.zoom=1;camera.updateProjectionMatrix();

  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.06;
  app.appendChild(renderer.domElement);

  // ---------- studio sky ----------
  const skyU={top:{value:new THREE.Color(0x3c4158)},horizon:{value:new THREE.Color(0x717693)}};
  const sky=new THREE.Mesh(new THREE.SphereGeometry(1400,24,14),new THREE.ShaderMaterial({
    side:THREE.BackSide,depthWrite:false,uniforms:skyU,
    vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vP;uniform vec3 top;uniform vec3 horizon;
      void main(){float h=normalize(vP).y;float t=smoothstep(-0.35,0.65,h);gl_FragColor=vec4(mix(horizon,top,t),1.0);}`
  }));
  scene.add(sky);

  const starGeo=new THREE.BufferGeometry();const sp=[];
  for(let i=0;i<500;i++){const r=1300,th=rand()*6.28,ph=rand()*0.6*Math.PI;
    sp.push(r*Math.sin(ph)*Math.cos(th),Math.abs(r*Math.cos(ph))*0.7+120,r*Math.sin(ph)*Math.sin(th));}
  starGeo.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
  const stars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xfff3df,size:2.2,sizeAttenuation:false,transparent:true,opacity:0}));
  scene.add(stars);

  // ---------- lights ----------
  const hemi=new THREE.HemisphereLight(0xd6e6ff,0x4a5a3a,0.62);scene.add(hemi);
  const key=new THREE.DirectionalLight(0xfff0d6,1.3);
  key.position.set(-70,95,55);key.castShadow=true;
  key.shadow.mapSize.set(2048,2048);key.shadow.radius=4;key.shadow.bias=-0.0006;
  const kc=key.shadow.camera;kc.left=-130;kc.right=130;kc.top=130;kc.bottom=-130;kc.near=20;kc.far=420;
  scene.add(key);scene.add(key.target);
  const fill=new THREE.DirectionalLight(0x88a0c8,0.4);fill.position.set(80,40,40);scene.add(fill);
  const rim=new THREE.DirectionalLight(0xffd9b0,0.35);rim.position.set(30,30,-90);scene.add(rim);

  const glowMeshes=[];

  // ---------- floating island ----------
  const islandGroup=new THREE.Group();scene.add(islandGroup);
  // top surface
  const segs=120;
  const tGeo=new THREE.PlaneGeometry(HALF*2+4,HALF*2+4,segs,segs);
  tGeo.rotateX(-Math.PI/2);
  const tp=tGeo.attributes.position,tcol=[];
  const cGrass=new THREE.Color(0x6cae58),cGrass2=new THREE.Color(0x549846),
        cRock=new THREE.Color(0x8d8678),cSand=new THREE.Color(0xb9b083),cSnow=new THREE.Color(0xc4cbcf);
  for(let i=0;i<tp.count;i++){
    const x=tp.getX(i),z=tp.getZ(i);const y=terrain(x,z);tp.setY(i,y);
    const d=Math.abs(x-riverX(z));const c=new THREE.Color();
    if(y>17)c.copy(cSnow).lerp(cRock,clamp((22-y)/8,0,1));
    else if(y>9)c.copy(cRock).lerp(cGrass2,clamp((17-y)/9,0,1));
    else if(d<4.6)c.copy(cSand);
    else c.copy(cGrass).lerp(cGrass2,rand()*0.5+(y<3?0.3:0));
    tcol.push(c.r,c.g,c.b);
  }
  tGeo.setAttribute('color',new THREE.Float32BufferAttribute(tcol,3));
  tGeo.computeVertexNormals();
  const top=new THREE.Mesh(tGeo,new THREE.MeshStandardMaterial({vertexColors:true,flatShading:true,roughness:.96,metalness:0}));
  top.receiveShadow=true;top.castShadow=true;islandGroup.add(top);

  // soil block (tapered 4-sided frustum) with strata
  const bGeo=new THREE.CylinderGeometry(HALF*1.414,HALF*1.06,46,4,3,false);
  bGeo.rotateY(Math.PI/4);bGeo.translate(0,-23,0);
  const bp=bGeo.attributes.position,bcol=[];
  const sLip=new THREE.Color(0x5d8a4c),sSoil=new THREE.Color(0x6f5740),sRock=new THREE.Color(0x564a3f),sDeep=new THREE.Color(0x39322c);
  for(let i=0;i<bp.count;i++){
    const y=bp.getY(i);const c=new THREE.Color();
    if(y>-3)c.copy(sLip);
    else if(y>-14)c.copy(sSoil).lerp(sRock,(-y-3)/11);
    else c.copy(sRock).lerp(sDeep,clamp((-y-14)/30,0,1));
    bcol.push(c.r,c.g,c.b);
  }
  bGeo.setAttribute('color',new THREE.Float32BufferAttribute(bcol,3));
  bGeo.computeVertexNormals();
  const block=new THREE.Mesh(bGeo,new THREE.MeshStandardMaterial({vertexColors:true,flatShading:true,roughness:1,metalness:0}));
  block.castShadow=true;block.receiveShadow=true;islandGroup.add(block);

  // ---------- river ----------
  (function(){
    const pts=[];for(let z=HALF-4;z>=-(HALF-4);z-=4){pts.push(new THREE.Vector3(riverX(z),terrain(riverX(z),z)+0.35,z));}
    const curve=new THREE.CatmullRomCurve3(pts);
    const geo=new THREE.TubeGeometry(curve,110,3.0,8,false);geo.scale(1,0.3,1);
    const river=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:0x4fa8c4,emissive:0x14485e,emissiveIntensity:.5,roughness:.12,metalness:.25,transparent:true,opacity:.92}));
    river.receiveShadow=true;islandGroup.add(river);
  })();

  const dummy=new THREE.Object3D();

  // ---------- forest: puffy low-poly canopies ----------
  (function(){
    const spots=[];
    for(let i=0;i<150;i++){
      let x,z,y,d,t=0;
      do{x=(rand()*2-1)*82;z=(rand()*2-1)*82;y=terrain(x,z);d=Math.abs(x-riverX(z));t++;}
      while((y<3||y>15||d<7||(z<-30&&z>-62&&x>-34&&x<22))&&t<10);
      if(t>=10)continue;spots.push({x,z,y,s:0.75+rand()*0.85,r:rand()*6.28,gold:rand()<0.12});
    }
    const trunkG=new THREE.CylinderGeometry(0.45,0.7,3.4,5);trunkG.translate(0,1.7,0);
    const trunkM=new THREE.MeshStandardMaterial({color:0x6b4a30,roughness:1,flatShading:true});
    const trunks=new THREE.InstancedMesh(trunkG,trunkM,spots.length);
    spots.forEach((p,i)=>{dummy.position.set(p.x,p.y,p.z);dummy.rotation.set(0,p.r,0);dummy.scale.set(p.s,p.s,p.s);dummy.updateMatrix();trunks.setMatrixAt(i,dummy.matrix);});
    islandGroup.add(trunks);
    // canopy: two overlapping squashed icospheres per tree
    const canG=new THREE.IcosahedronGeometry(2.5,1);
    const green=new THREE.MeshStandardMaterial({color:0x4f9a4e,roughness:.95,flatShading:true});
    const greenG=new THREE.InstancedMesh(canG,green,spots.length*2);
    const goldList=spots.filter(p=>p.gold);
    const goldG=new THREE.InstancedMesh(canG,new THREE.MeshStandardMaterial({color:0xcaa54e,roughness:.95,flatShading:true}),Math.max(goldList.length*2,1));
    greenG.castShadow=true;goldG.castShadow=true;
    let gi=0,goi=0;
    spots.forEach(p=>{
      const baseY=p.y+3.4*p.s+1.8*p.s;
      for(let k=0;k<2;k++){
        const off=k===0?0:1.3;
        dummy.position.set(p.x+(rand()-.5)*1.2*p.s,baseY+off*p.s,p.z+(rand()-.5)*1.2*p.s);
        dummy.rotation.set(rand(),rand(),rand());
        const sc=p.s*(k===0?1.0:0.72);dummy.scale.set(sc,sc*0.82,sc);dummy.updateMatrix();
        if(p.gold){goldG.setMatrixAt(goi++,dummy.matrix);}else{greenG.setMatrixAt(gi++,dummy.matrix);}
      }
    });
    greenG.count=gi;goldG.count=Math.max(goi,0);
    islandGroup.add(greenG);if(goi>0)islandGroup.add(goldG);
  })();

  // ---------- rocks ----------
  (function(){
    const rg=new THREE.IcosahedronGeometry(1,0);
    const rm=new THREE.MeshStandardMaterial({color:0x9a958a,roughness:1,flatShading:true});
    const rocks=new THREE.InstancedMesh(rg,rm,46);rocks.castShadow=true;rocks.receiveShadow=true;
    let n=0;
    while(n<46){const x=(rand()*2-1)*84,z=(rand()*2-1)*84,y=terrain(x,z);
      if(y<2||y>16){continue;}
      dummy.position.set(x,y+0.4,z);dummy.rotation.set(rand()*6,rand()*6,rand()*6);
      const sc=0.6+rand()*1.7;dummy.scale.set(sc,sc*(0.6+rand()*0.5),sc);dummy.updateMatrix();
      rocks.setMatrixAt(n++,dummy.matrix);}
    islandGroup.add(rocks);
  })();

  // ---------- grass tufts ----------
  (function(){
    const bg=new THREE.ConeGeometry(0.16,1.3,4);bg.translate(0,0.65,0);
    const bm=new THREE.MeshStandardMaterial({color:0x6fb257,roughness:1,flatShading:true});
    const N=520;const blades=new THREE.InstancedMesh(bg,bm,N);let n=0,tries=0;
    while(n<N&&tries<N*4){tries++;
      const x=(rand()*2-1)*84,z=(rand()*2-1)*84,y=terrain(x,z),d=Math.abs(x-riverX(z));
      if(y<2.5||y>10||d<2){continue;}
      dummy.position.set(x,y,z);dummy.rotation.set(0,rand()*6,(rand()-.5)*0.4);
      const sc=0.6+rand()*0.9;dummy.scale.set(sc,sc,sc);dummy.updateMatrix();blades.setMatrixAt(n++,dummy.matrix);}
    blades.count=n;islandGroup.add(blades);
  })();

  // ---------- builders ----------
  function box(w,h,d,color,o){o=o||{};
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({
      color,roughness:o.rough!=null?o.rough:.85,metalness:o.metal||0,
      emissive:o.emissive||0x000000,emissiveIntensity:o.ei||0,flatShading:true,
      transparent:!!o.trans,opacity:o.trans||1}));
    m.castShadow=true;m.receiveShadow=true;return m;}
  function pavilion(x,z,w,d,wallC,roofC){
    const g=new THREE.Group();const by=terrain(x,z);
    const wallH=3.4;const wall=box(w,wallH,d,wallC,{rough:.8});wall.position.set(x,by+wallH/2,z);g.add(wall);
    const win=box(w+.06,wallH*0.42,d+.06,0xffce7a,{emissive:0xffce7a,ei:.5,rough:.3});
    win.position.set(x,by+wallH*0.5,z);g.add(win);glowMeshes.push(win.material);
    // hipped roof via pyramid (cone, 4 sides)
    const roof=new THREE.Mesh(new THREE.ConeGeometry(Math.max(w,d)*0.92,2.4,4),
      new THREE.MeshStandardMaterial({color:roofC,roughness:.7,flatShading:true,metalness:.05}));

  // ========== WILDFIRE SYSTEM ==========
  const fireCtrl=(function(){
    const center=new THREE.Vector3(-54,terrain(-54,-16),-16);
    let state='idle',timer=0,fireI=0,maxR=2;
    const FN=150,SN=64,WN=90;
    const fpos=new Float32Array(FN*3),fcol=new Float32Array(FN*3),fpart=[];
    const fgeo=new THREE.BufferGeometry();fgeo.setAttribute('position',new THREE.BufferAttribute(fpos,3));fgeo.setAttribute('color',new THREE.BufferAttribute(fcol,3));
    const fmesh=new THREE.Points(fgeo,new THREE.PointsMaterial({size:6,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:.95,map:texWhite,blending:THREE.AdditiveBlending,depthWrite:false}));fmesh.renderOrder=5;scene.add(fmesh);
    const spos=new Float32Array(SN*3),spart=[];
    const sgeo=new THREE.BufferGeometry();sgeo.setAttribute('position',new THREE.BufferAttribute(spos,3));
    const smat=new THREE.PointsMaterial({size:16,sizeAttenuation:false,color:0x4a4d54,transparent:true,opacity:0,map:texWhite,depthWrite:false});
    const smesh=new THREE.Points(sgeo,smat);smesh.renderOrder=5;scene.add(smesh);
    const wpos=new Float32Array(WN*3),wpart=[];
    const wgeo=new THREE.BufferGeometry();wgeo.setAttribute('position',new THREE.BufferAttribute(wpos,3));
    const wmesh=new THREE.Points(wgeo,new THREE.PointsMaterial({size:5,sizeAttenuation:false,color:0x9fdcff,transparent:true,opacity:.9,map:texWhite,blending:THREE.AdditiveBlending,depthWrite:false}));wmesh.renderOrder=5;scene.add(wmesh);
    const scorch=new THREE.Mesh(new THREE.CircleGeometry(1,22),new THREE.MeshStandardMaterial({color:0x1b1510,roughness:1,transparent:true,opacity:0}));scorch.rotation.x=-Math.PI/2;scorch.position.set(center.x,center.y+0.2,center.z);scene.add(scorch);
    const flight=new THREE.PointLight(0xff6a2a,0,46);flight.position.set(center.x,center.y+4,center.z);scene.add(flight);
    let origTip=null;

    function setTicker(t,c){tickerText.textContent=t;if(tickerPulse)tickerPulse.style.background=c;}
    function dispatch(){[1,2,3].forEach((di,k)=>{const d=drones[di];if(!d)return;d.userData.mode='fire-go';d.userData.fc=center;d.userData.fr=7;d.userData.fang=k/3*6.28;d.userData.fpt=new THREE.Vector3(center.x+Math.cos(d.userData.fang)*7,center.y+9,center.z+Math.sin(d.userData.fang)*7);});}
    function recall(){[1,2,3].forEach(di=>{if(drones[di])drones[di].userData.mode='fire-back';});}
    function flare(){const tp=sensorTips[0];if(tp){origTip={c:tp.mat.color.clone(),e:tp.mat.emissive.clone(),b:tp.base};tp.mat.color.set(0xff4530);tp.mat.emissive.set(0xff4530);tp.base=3.2;}}
    function unflare(){const tp=sensorTips[0];if(tp&&origTip){tp.mat.color.copy(origTip.c);tp.mat.emissive.copy(origTip.e);tp.base=origTip.b;origTip=null;}}

    function trigger(){if(fireActive)return;fireActive=true;state='ignite';timer=0;fireI=0.06;maxR=2;setTicker('Ignition detected — Wildwood, S-slope','#ff7a3a');}

    function update(dt,now){
      if(!fireActive&&fireI<=0&&fpart.length===0){fmesh.visible=smesh.visible=wmesh.visible=false;flight.intensity=0;return;}
      fmesh.visible=smesh.visible=wmesh.visible=true;timer+=dt;
      if(state==='ignite'){fireI=Math.min(0.5,fireI+dt*0.55);if(timer>1.8){state='spread';setTicker('WILDFIRE — drone squadron dispatched for suppression','#ff5a4a');dispatch();flare();}}
      else if(state==='spread'){fireI=Math.min(1,fireI+dt*0.4);if(timer>4.5){state='suppress';setTicker('Water drop in progress · containing the front','#9fdcff');}}
      else if(state==='suppress'){fireI=Math.max(0,fireI-dt*0.17);
        [1,2,3].forEach(di=>{const d=drones[di];if(d&&d.userData.mode==='fire-hover'&&wpart.length<WN&&rand()<0.6){wpart.push({x:d.position.x,y:d.position.y,z:d.position.z,vy:-16});}});
        if(fireI<=0.04){state='contain';timer=0;setTicker('Fire contained · sector secured · damage assessed','#7ad6a8');recall();unflare();}}
      else if(state==='contain'){fireI=Math.max(0,fireI-dt*0.5);if(timer>3.5){fireActive=false;state='idle';}}
      const r=2+fireI*5.5;if(r>maxR)maxR=r;
      // flames
      const wantF=Math.round(fireI*FN);
      while(fpart.length<wantF){const a=rand()*6.28,rr=Math.sqrt(rand())*r*0.6;fpart.push({x:center.x+Math.cos(a)*rr,z:center.z+Math.sin(a)*rr,y:center.y+0.4,vy:4+rand()*4,age:0,life:0.45+rand()*0.5});}
      let n=0;for(let i=fpart.length-1;i>=0;i--){const p=fpart[i];p.age+=dt;p.y+=p.vy*dt;p.vy+=dt*2;if(p.age>=p.life||n>=FN){fpart.splice(i,1);continue;}
        fpos[n*3]=p.x;fpos[n*3+1]=p.y;fpos[n*3+2]=p.z;const t=p.age/p.life;
        fcol[n*3]=1;fcol[n*3+1]=lerp(0.85,0.2,t);fcol[n*3+2]=lerp(0.35,0.02,t);n++;}
      for(let j=n;j<FN;j++){fpos[j*3]=99999;fpos[j*3+1]=99999;fpos[j*3+2]=99999;}
      fgeo.attributes.position.needsUpdate=true;fgeo.attributes.color.needsUpdate=true;
      // smoke
      const wantS=Math.round((fireI*0.7+(state==='contain'?0.3:0))*SN);
      while(spart.length<wantS){const a=rand()*6.28,rr=rand()*r*0.5;spart.push({x:center.x+Math.cos(a)*rr,z:center.z+Math.sin(a)*rr,y:center.y+2,vy:3+rand()*2,dx:(rand()-.5)*2,age:0,life:1.6+rand()*1.2});}
      let sn=0;for(let i=spart.length-1;i>=0;i--){const p=spart[i];p.age+=dt;p.y+=p.vy*dt;p.x+=p.dx*dt;if(p.age>=p.life||sn>=SN){spart.splice(i,1);continue;}
        spos[sn*3]=p.x;spos[sn*3+1]=p.y;spos[sn*3+2]=p.z;sn++;}
      for(let j=sn;j<SN;j++){spos[j*3]=99999;spos[j*3+1]=99999;spos[j*3+2]=99999;}
      sgeo.attributes.position.needsUpdate=true;smat.opacity=clamp(fireI*0.55+(state==='contain'?0.25:0),0,0.6);
      // water
      let wn=0;for(let i=wpart.length-1;i>=0;i--){const p=wpart[i];p.y+=p.vy*dt;p.vy-=dt*8;
        if(p.y<=center.y+0.5||wn>=WN){wpart.splice(i,1);continue;}wpos[wn*3]=p.x;wpos[wn*3+1]=p.y;wpos[wn*3+2]=p.z;wn++;}
      for(let j=wn;j<WN;j++){wpos[j*3]=99999;wpos[j*3+1]=99999;wpos[j*3+2]=99999;}
      wgeo.attributes.position.needsUpdate=true;
      // scorch + light
      scorch.scale.setScalar(Math.max(0.1,maxR*0.95));scorch.material.opacity=clamp(maxR>2?0.85:fireI,0,0.85);
      flight.intensity=fireI*3.2*(0.8+0.2*Math.sin(now*0.03));flight.position.y=center.y+3+fireI*2;
    }
    return {trigger,update,center};
  })();

  function updateDrones(dt,now){

      else if(u.mode==='fire-hover'){u.fang+=dt*0.7;d.position.set(u.fc.x+Math.cos(u.fang)*u.fr,u.fc.y+9+Math.sin(now*0.005+di)*0.6,u.fc.z+Math.sin(u.fang)*u.fr);d.rotation.y=-u.fang;}
      else if(u.mode==='fire-back'){const h=patrolPos(u);d.position.lerp(h,0.04);if(d.position.distanceTo(h)<2)u.mode='patrol';}
      else if(u.mode==='go'&&u.tgt){const aim=new THREE.Vector3(u.tgt.x,u.tgt.y+6,u.tgt.z);d.position.lerp(aim,0.045);if(d.position.distanceTo(aim)<2)u.mode='hold';}
      else if(u.mode==='hold'){u.hold-=dt;if(u.hold<=0)u.mode='back';}
      else if(u.mode==='back'){const h=patrolPos(u);d.position.lerp(h,0.045);if(d.position.distanceTo(h)<2)u.mode='patrol';}
      else{u.ph+=dt*u.sp;const x=Math.cos(u.ph)*u.r,z=Math.sin(u.ph)*u.r-8;d.position.set(x,terrain(x,z)+u.h,z);d.rotation.y=-u.ph;}
    });

    const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,1.3,5),new THREE.MeshStandardMaterial({color:0xbfc4cc}));neck.position.set(0.3,2.85,0);neck.rotation.z=-0.4;g.add(neck);
    g.position.set(x,by,z);g.traverse(o=>{if(o.isMesh)o.castShadow=true;});scene.add(g);})();

  function updateFauna(dt,now){
    sheep.forEach(s=>{s.t+=dt*s.sp;if(s.t>=1){s.t-=1;s.seg=(s.seg+1)%s.path.length;}
      const a=s.path[s.seg],b=s.path[(s.seg+1)%s.path.length];const x=lerp(a[0],b[0],s.t)+s.off,z=lerp(a[1],b[1],s.t);
      s.g.position.set(x,terrain(x,z),z);s.g.position.y+=Math.abs(Math.sin(now*0.006+s.seg))*0.05;s.g.rotation.y=Math.atan2(b[0]-a[0],b[1]-a[1]);});
    ducks.forEach(d=>{d.ph+=dt*d.sp;const x=d.cx+Math.cos(d.ph)*d.rad,z=d.cz+Math.sin(d.ph)*d.rad;
      d.g.position.set(x,d.by+Math.sin(now*0.003+d.ph)*0.06,z);d.g.rotation.y=-d.ph;});
  }

  // ---------- controls (orthographic orbit) ----------
  const target=new THREE.Vector3(0,4,2);
  const RAD=600;
  const goal={theta:Math.PI*0.25,phi:0.95,zoom:1,target:target.clone()};
  const cur={theta:goal.theta,phi:goal.phi,zoom:1};
  let autoRotate=true;const reduced=matchMedia('(prefers-reduced-motion:reduce)').matches;
  let dragging=false,lastX=0,lastY=0,downT=0,moved=0,pinchD=0;

  function onDown(x,y){dragging=true;lastX=x;lastY=y;downT=performance.now();moved=0;autoRotate=false;syncRotate();}
  function onMove(x,y){if(!dragging)return;const dx=x-lastX,dy=y-lastY;lastX=x;lastY=y;moved+=Math.abs(dx)+Math.abs(dy);
    goal.theta-=dx*0.006;goal.phi=clamp(goal.phi-dy*0.005,0.25,1.45);}
  function onUp(x,y){if(dragging){const dt=performance.now()-downT;if(moved<6&&dt<350)pick(x,y);}dragging=false;}
  renderer.domElement.addEventListener('mousedown',e=>onDown(e.clientX,e.clientY));
  addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
  addEventListener('mouseup',e=>onUp(e.clientX,e.clientY));
  renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();goal.zoom=clamp(goal.zoom*(1-Math.sign(e.deltaY)*0.1),0.55,4);autoRotate=false;syncRotate();},{passive:false});
  renderer.domElement.addEventListener('touchstart',e=>{if(e.touches.length===1)onDown(e.touches[0].clientX,e.touches[0].clientY);else if(e.touches.length===2){dragging=false;pinchD=tDist(e);}},{passive:false});
  renderer.domElement.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1)onMove(e.touches[0].clientX,e.touches[0].clientY);else if(e.touches.length===2){const d=tDist(e);if(pinchD)goal.zoom=clamp(goal.zoom*d/pinchD,0.55,4);pinchD=d;autoRotate=false;syncRotate();}},{passive:false});
  renderer.domElement.addEventListener('touchend',e=>{if(e.changedTouches.length)onUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);pinchD=0;});
  function tDist(e){const a=e.touches[0],b=e.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}

  const ray=new THREE.Raycaster();const ndc=new THREE.Vector2();
  function pick(px,py){ndc.x=(px/innerWidth)*2-1;ndc.y=-(py/innerHeight)*2+1;ray.setFromCamera(ndc,camera);
    const hits=ray.intersectObjects(sprites,false);if(hits.length)openSystem(hits[0].object.userData.sys);}

  const info=document.getElementById('info');
  function openSystem(s){document.getElementById('infoEyebrow').textContent='Living system';
    document.getElementById('infoTitle').textContent=s.t;document.getElementById('infoBody').textContent=s.body;
    info.classList.add('open');flyTo(s.pos);legend.classList.add('hidden');btnSystems.classList.remove('on');}
  document.getElementById('infoClose').onclick=()=>info.classList.remove('open');
  function flyTo(p){goal.target.set(p.x,p.y-4,p.z);goal.zoom=1.7;const ang=Math.atan2(p.z,p.x);goal.theta=ang+Math.PI*0.6;goal.phi=0.92;autoRotate=false;syncRotate();}

  const legend=document.getElementById('legend');legend.innerHTML='<h2>Explore the organism</h2>';
  systems.forEach(s=>{const b=document.createElement('button');b.innerHTML='<span class="dot" style="color:'+s.c+'"></span>'+s.t;b.onclick=()=>openSystem(s);legend.appendChild(b);});
  const btnSystems=document.getElementById('btnSystems');
  btnSystems.onclick=()=>{const h=legend.classList.toggle('hidden');btnSystems.classList.toggle('on',!h);};
  const btnRotate=document.getElementById('btnRotate');
  function syncRotate(){btnRotate.classList.toggle('on',autoRotate);}
  btnRotate.onclick=()=>{autoRotate=!autoRotate;syncRotate();};
  document.getElementById('btnReset').onclick=()=>{goal.target.set(0,4,2);goal.theta=Math.PI*0.25;goal.phi=0.95;goal.zoom=1;info.classList.remove('open');autoRotate=true;syncRotate();};
  let night=false;const btnNight=document.getElementById('btnNight');
  btnNight.onclick=()=>{night=!night;btnNight.classList.toggle('on',night);btnNight.textContent=night?'Day':'Night';};

  addEventListener('resize',()=>{aspect=innerWidth/innerHeight;camera.left=-FR*aspect;camera.right=FR*aspect;camera.top=FR;camera.bottom=-FR;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  setTimeout(()=>{document.getElementById('hint').style.opacity='0';},5200);

  // day/night states
  const day={key:1.3,hemi:.62,fill:.4,star:0,glow:1,top:new THREE.Color(0x3c4158),hor:new THREE.Color(0x717693)};
  const ngt={key:.18,hemi:.22,fill:.12,star:1,glow:2.0,top:new THREE.Color(0x070a14),hor:new THREE.Color(0x1c2440)};
  const st={key:1.3,hemi:.62,fill:.4,star:0,glow:1};

  let last=performance.now();
  function animate(now){requestAnimationFrame(animate);
   try{
    const dt=Math.min((now-last)/1000,0.05);last=now;
    if(autoRotate&&!reduced)goal.theta+=dt*0.06;
    cur.theta=lerp(cur.theta,goal.theta,0.08);cur.phi=lerp(cur.phi,goal.phi,0.08);cur.zoom=lerp(cur.zoom,goal.zoom,0.1);
    target.lerp(goal.target,0.08);
    camera.zoom=cur.zoom;camera.updateProjectionMatrix();
    camera.position.set(target.x+RAD*Math.sin(cur.phi)*Math.cos(cur.theta),target.y+RAD*Math.cos(cur.phi),target.z+RAD*Math.sin(cur.phi)*Math.sin(cur.theta));
    camera.lookAt(target);

    updateLife(dt,now);updateNetwork(dt);updateEvents(dt);updateDrones(dt,now);fireCtrl.update(dt,now);updateNature(dt,now);updateFauna(dt,now);
    if(!reduced)turbines.forEach((b,i)=>b.rotation.z+=dt*(1.0+i*0.15));
    if(funCar){const t=0.5+0.5*Math.sin(now*0.0002);funCar.position.lerpVectors(funA,funB,t);}
    sprites.forEach(s=>{const p=reduced?1:1+0.12*Math.sin(now*0.003+s.userData.phase);s.scale.set(5.5*p,5.5*p,1);});

    const tgt=night?ngt:day;const k=1-Math.pow(0.0015,dt);
    st.key=lerp(st.key,tgt.key,k);st.hemi=lerp(st.hemi,tgt.hemi,k);st.fill=lerp(st.fill,tgt.fill,k);
    st.star=lerp(st.star,tgt.star,k);st.glow=lerp(st.glow,tgt.glow,k);
    key.intensity=st.key;hemi.intensity=st.hemi;fill.intensity=st.fill;rim.intensity=st.fill*0.9;
    stars.material.opacity=st.star;
    flyMat.opacity=st.star*0.9;bfMat.opacity=(1-st.star)*0.9;
    glowMeshes.forEach(m=>{m.emissiveIntensity=st.glow*(m._base||1);});
    skyU.top.value.copy(day.top).lerp(ngt.top,st.star);skyU.horizon.value.copy(day.hor).lerp(ngt.hor,st.star);

    renderer.render(scene,camera);
   }catch(__ae){if(!window.__animErr){window.__animErr=true;console.error('Animation loop error:',__ae);}}
  }
  // capture base emissive so day/night scales relatively
  glowMeshes.forEach(m=>{m._base=m.emissiveIntensity||0.5;});
  requestAnimationFrame(animate);syncRotate();
  setTimeout(()=>document.getElementById('loader').classList.add('gone'),650);
  }catch(__e){console.error('Campus init error:',__e);var __L=document.getElementById('loader');if(__L){var __p=__L.querySelector('p');if(__p)__p.textContent='Init error (see console)';}}
})();
</script>
</body>
</html>
